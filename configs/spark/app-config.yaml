          {"source_table": "dim_ward", "source_format": "csv", "source_path": "s3a://vdt-logistics-dev-artifacts-747452892492/dim-seed/dim_ward/dim_ward.csv"},
          {"source_table": "dim_facility", "source_format": "csv", "source_path": "s3a://vdt-logistics-dev-artifacts-747452892492/dim-seed/dim_facility/dim_facility.csv"},
          {"source_table": "dim_branch", "source_format": "csv", "source_path": "s3a://vdt-logistics-dev-artifacts-747452892492/dim-seed/dim_branch/dim_branch.csv"},
